name: Deploy to Alexa

on:
  push:
    branches: [main]
    paths:
      - 'src/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18.x'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install ASK CLI
        run: npm install -g ask-cli@2.30.7

      - name: Configure ASK CLI
        run: |
          mkdir -p ~/.ask
          cat > ~/.ask/cli_config << 'ASKEOF'
          {
            "profiles": {
              "default": {
                "token": {
                  "access_token": "${{ secrets.ASK_ACCESS_TOKEN }}",
                  "refresh_token": "${{ secrets.ASK_REFRESH_TOKEN }}",
                  "token_type": "bearer",
                  "expires_in": 3600,
                  "expires_at": "2026-01-01T00:00:00.000Z"
                },
                "vendor_id": "${{ secrets.ASK_VENDOR_ID }}"
              }
            }
          }
          ASKEOF

      - name: Deploy Lambda code
        env:
          SKILL_ID: ${{ secrets.ALEXA_SKILL_ID }}
        run: |
          echo "skill-dir" | ask init --hosted-skill-id "$SKILL_ID" || true
          DIR=$(find . -maxdepth 1 -type d \( -name "skill-dir" -o -name "alexa-*" \) | head -1)

          if [ -d "$DIR/lambda" ]; then
            # Only required Lambda files
            cp src/handler.js "$DIR/lambda/index.js"
            cp src/stories.js "$DIR/lambda/stories.js"
            cp src/utils/ssml.js "$DIR/lambda/ssml.js"
            sed -i "s|require('./utils/ssml')|require('./ssml')|g" "$DIR/lambda/index.js"

            # Clean unused files
            rm -f "$DIR/lambda/languageStrings.js" "$DIR/lambda/util.js" "$DIR/lambda/local-debugger.js" "$DIR/lambda/stories_new.js"

            # Interaction models
            mkdir -p "$DIR/skill-package/interactionModels/custom"
            cp src/interactionModel.json "$DIR/skill-package/interactionModels/custom/en-IN.json"
            cp src/interactionModel.json "$DIR/skill-package/interactionModels/custom/en-US.json"
            cp src/interactionModel.hi.json "$DIR/skill-package/interactionModels/custom/hi-IN.json"

            cd "$DIR"
            git add -A
            git diff --cached --quiet || git commit -m "Deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin master
          else
            echo "ERROR: Hosted skill directory not found"
            exit 1
          fi

      - name: Update interaction models
        env:
          SKILL_ID: ${{ secrets.ALEXA_SKILL_ID }}
        run: |
          ask smapi set-interaction-model --skill-id "$SKILL_ID" --stage development --locale en-IN --interaction-model "file:src/interactionModel.json"
          ask smapi set-interaction-model --skill-id "$SKILL_ID" --stage development --locale en-US --interaction-model "file:src/interactionModel.json"
          ask smapi set-interaction-model --skill-id "$SKILL_ID" --stage development --locale hi-IN --interaction-model "file:src/interactionModel.hi.json"
