name: Deploy to Alexa

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'skill-package/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install ASK CLI
        run: npm install -g ask-cli

      - name: Configure ASK CLI
        run: |
          mkdir -p ~/.ask
          cat > ~/.ask/cli_config << EOF
          {
            "profiles": {
              "default": {
                "token": {
                  "access_token": "${{ secrets.ASK_ACCESS_TOKEN }}",
                  "refresh_token": "${{ secrets.ASK_REFRESH_TOKEN }}",
                  "token_type": "bearer",
                  "expires_in": 3600,
                  "expires_at": "2099-01-01T00:00:00.000Z"
                },
                "vendor_id": "${{ secrets.ASK_VENDOR_ID }}"
              }
            }
          }
          EOF

      - name: Sync Lambda code to hosted skill
        run: |
          SKILL_ID="${{ secrets.ALEXA_SKILL_ID }}"
          REPO_URL="https://git-codecommit.us-east-1.amazonaws.com/v1/repos/${SKILL_ID#amzn1.ask.skill.}"

          # Clone hosted skill repo
          echo "dummy" | ask init --hosted-skill-id "$SKILL_ID" || true
          SKILL_DIR=$(ls -d */ | grep -v node_modules | grep -v src | grep -v .github | head -1)

          if [ -d "$SKILL_DIR" ]; then
            # Copy source files
            cp src/handler.js "$SKILL_DIR/lambda/index.js"
            cp src/stories.js "$SKILL_DIR/lambda/stories.js"
            cp src/utils/ssml.js "$SKILL_DIR/lambda/ssml.js"
            sed -i "s|require('./utils/ssml')|require('./ssml')|g" "$SKILL_DIR/lambda/index.js"

            # Copy interaction models
            cp src/interactionModel.json "$SKILL_DIR/skill-package/interactionModels/custom/en-IN.json"
            cp src/interactionModel.json "$SKILL_DIR/skill-package/interactionModels/custom/en-US.json"
            cp src/interactionModel.hi.json "$SKILL_DIR/skill-package/interactionModels/custom/hi-IN.json"

            # Push to hosted skill
            cd "$SKILL_DIR"
            git add -A
            git commit -m "Deploy from GitHub Actions" || echo "No changes"
            git push origin master || echo "Push failed"
          fi

      - name: Update interaction models
        run: |
          SKILL_ID="${{ secrets.ALEXA_SKILL_ID }}"
          ask smapi set-interaction-model --skill-id "$SKILL_ID" --stage development --locale en-IN --interaction-model "file:src/interactionModel.json" || true
          ask smapi set-interaction-model --skill-id "$SKILL_ID" --stage development --locale en-US --interaction-model "file:src/interactionModel.json" || true
          ask smapi set-interaction-model --skill-id "$SKILL_ID" --stage development --locale hi-IN --interaction-model "file:src/interactionModel.hi.json" || true

      - name: Verify deployment
        run: |
          sleep 10
          SKILL_ID="${{ secrets.ALEXA_SKILL_ID }}"
          ask smapi get-skill-status --skill-id "$SKILL_ID" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          for k, v in d.get('interactionModel', {}).items():
              status = v.get('lastUpdateRequest', {}).get('status', '?')
              print(f'  {k}: {status}')
          "
