AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Alexa Story Time — Phase 1 (TTS/SSML storytelling).
  Stories are bundled in the Lambda package. No S3 required.

Globals:
  Function:
    Runtime: nodejs18.x
    Timeout: 10

Resources:
  AlexaStoryLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: alexa-story-plugin
      CodeUri: .
      Handler: src/handler.handler
      Events:
        AlexaSkillEvent:
          Type: AlexaSkill

Outputs:
  AlexaStoryLambdaArn:
    Description: ARN of the Alexa story Lambda
    Value: !GetAtt AlexaStoryLambda.Arn
