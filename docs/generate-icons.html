<!DOCTYPE html>
<html>
<head><title>Generate Skill Icons</title></head>
<body>
<canvas id="c108" width="108" height="108"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(1, '#16213e');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.18);
  ctx.fill();

  // Stars
  ctx.fillStyle = '#e2d96f';
  const starPositions = [[0.2,0.15],[0.75,0.12],[0.85,0.35],[0.15,0.4],[0.6,0.25]];
  starPositions.forEach(([x,y]) => {
    const s = size * 0.015;
    ctx.beginPath();
    ctx.arc(size*x, size*y, s, 0, Math.PI*2);
    ctx.fill();
  });

  // Open book
  const bx = size * 0.5, by = size * 0.55, bw = size * 0.35, bh = size * 0.22;
  ctx.strokeStyle = '#f0a500';
  ctx.lineWidth = size * 0.012;
  ctx.fillStyle = '#f8f0e3';
  // Left page
  ctx.beginPath();
  ctx.moveTo(bx, by - bh*0.1);
  ctx.quadraticCurveTo(bx - bw*0.5, by - bh*0.3, bx - bw, by);
  ctx.lineTo(bx - bw, by + bh);
  ctx.quadraticCurveTo(bx - bw*0.5, by + bh*0.8, bx, by + bh*0.7);
  ctx.fill();
  ctx.stroke();
  // Right page
  ctx.beginPath();
  ctx.moveTo(bx, by - bh*0.1);
  ctx.quadraticCurveTo(bx + bw*0.5, by - bh*0.3, bx + bw, by);
  ctx.lineTo(bx + bw, by + bh);
  ctx.quadraticCurveTo(bx + bw*0.5, by + bh*0.8, bx, by + bh*0.7);
  ctx.fill();
  ctx.stroke();

  // Sparkles from book
  ctx.fillStyle = '#f0a500';
  [[0.35,0.38],[0.65,0.35],[0.45,0.3],[0.58,0.32]].forEach(([x,y]) => {
    const s = size * 0.012;
    ctx.beginPath();
    ctx.moveTo(size*x, size*y - s*2);
    ctx.lineTo(size*x + s*0.5, size*y - s*0.5);
    ctx.lineTo(size*x + s*2, size*y);
    ctx.lineTo(size*x + s*0.5, size*y + s*0.5);
    ctx.lineTo(size*x, size*y + s*2);
    ctx.lineTo(size*x - s*0.5, size*y + s*0.5);
    ctx.lineTo(size*x - s*2, size*y);
    ctx.lineTo(size*x - s*0.5, size*y - s*0.5);
    ctx.fill();
  });

  // Text
  ctx.fillStyle = '#f0a500';
  ctx.textAlign = 'center';
  ctx.font = `bold ${size * 0.09}px system-ui, sans-serif`;
  ctx.fillText("IT'S", bx, by + bh + size*0.1);
  ctx.font = `bold ${size * 0.11}px system-ui, sans-serif`;
  ctx.fillText('STORY TIME', bx, by + bh + size*0.22);
}

drawIcon(document.getElementById('c108'), 108);
drawIcon(document.getElementById('c512'), 512);

// Auto-download
['c108','c512'].forEach(id => {
  const c = document.getElementById(id);
  const link = document.createElement('a');
  link.download = `icon-${c.width}x${c.height}.png`;
  link.href = c.toDataURL('image/png');
  link.click();
});
</script>
<p>Icons generated and downloading...</p>
</body>
</html>
